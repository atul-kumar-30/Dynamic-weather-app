<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Weather App</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
</head>
<body>
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-container">
        <div class="top-controls">
            <h1 class="app-title"><i class="fas fa-cloud-sun"></i> Skycast</h1>
            <div class="unit-toggle" id="unit-toggle">
                <span class="active" id="celsius-label">°C</span>
                <span>/</span>
                <span id="fahrenheit-label">°F</span>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="input-box" placeholder="Enter City Name..." autocomplete="off">
            <button id="search-btn"><i class="fas fa-search"></i></button>
        </div>
        
        <div id="recent-searches"></div>

        <div class="loader-container" id="loader">
            <div class="loader"></div>
        </div>

        <div id="weather-body" class="weather-body" style="display: none;">
        </div>
        
        <div id="forecast-body" class="forecast-container" style="display: none;">
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
